name: Tests

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --group dev
        env:
          UV_TORCH_BACKEND: cpu

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
